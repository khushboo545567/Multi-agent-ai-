# in this code whenever the redis restarts the data will be gone
version: "3.8"

# services:
#   redis:
#     image: redis:7
#     container_name: redis-server
#     restart: always
#     ports:
#       - "6379:6379"

# to store the data permentaly we have to write in the disk as well
services:
  redis:
    image: redis:7
    container_name: redis-server
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  redis-data:
